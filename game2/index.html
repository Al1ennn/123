    <div id="game-container">
        <div id="game-ui">
            <h1>Retro Cafe Waiter</h1>
            <div id="score">Рівень: <span id="level-display">1</span> | Чайові: $<span id="score-display">0</span></div>
        </div>
        
        <canvas id="gameCanvas"></canvas>

        <div id="mobile-controls">
            <div class="control-row">
                <button id="btn-up" class="dpad-btn">W</button>
            </div>
            <div class="control-row">
                <button id="btn-left" class="dpad-btn">A</button>
                <button id="btn-down" class="dpad-btn">S</button>
                <button id="btn-right" class="dpad-btn">D</button>
            </div>
        </div>
    </div>
    
    <div id="win-screen" class="screen">
        <h2 style="color: #0f0; text-shadow: 0 0 20px #0f0;">ЗМІНУ ЗАКРИТО!</h2>
        <p>Ти зібрав усі чайові на цьому поверсі.</p>
        <div style="display: flex; gap: 20px; margin-top: 20px;">
            <button id="next-level-btn" style="color: #0f0; border-color: #0f0;">👉 Наступний рівень</button>
            <button onclick="alert('Ось твій промокод на каву: RETRO10! Дякуємо за роботу.'); location.reload();" style="color: #ff0; border-color: #ff0;">🎁 Забрати знижку 10%</button>
        </div>
    </div>

    <div id="final-win-screen" class="screen">
        <h2 style="color: #0ff; text-shadow: 0 0 20px #0ff;">ЛЕГЕНДА КАФЕ!</h2>
        <p>Ти пройшов усі 3 рівні і не розлив жодної кави.</p>
        <button onclick="alert('ТВІЙ СУПЕР ПРОМОКОД: BOSS50! Насолоджуйся!'); location.reload();" style="color: #0ff; border-color: #0ff; margin-top: 20px;">👑 Забрати знижку 50%</button>
    </div>

    <div id="lose-screen" class="screen">
